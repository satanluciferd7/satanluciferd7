<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Nepal Portal - Messaging. Send and receive messages from community members."/>
  <meta name="theme-color" content="#0066cc"/>
  <title>Messages - Nepal Portal</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="styles-enhanced.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .messaging-container {
      display: flex;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
      height: calc(100vh - 200px);
    }

    .conversations-list {
      width: 320px;
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .conversations-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .conversations-header h2 {
      margin: 0;
      font-size: 1.3rem;
    }

    .conversations-scroll {
      flex: 1;
      overflow-y: auto;
    }

    .conversation-item {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .conversation-item:hover {
      background: rgba(0, 102, 204, 0.05);
    }

    .conversation-item.active {
      background: rgba(0, 102, 204, 0.1);
      border-left: 4px solid var(--primary);
    }

    .conv-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #004999);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
      font-weight: 600;
    }

    .conv-info {
      flex: 1;
      min-width: 0;
    }

    .conv-name {
      font-weight: 600;
      margin: 0;
    }

    .conv-last-msg {
      font-size: 0.85rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin: 4px 0 0 0;
    }

    .conversation-panel {
      flex: 1;
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(0, 102, 204, 0.1);
      border-left: 3px solid var(--primary);
      word-wrap: break-word;
    }

    .message.received .message-content {
      background: rgba(100, 100, 100, 0.1);
      border-left-color: var(--text-muted);
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .chat-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      flex-direction: column;
      gap: 10px;
    }

    .chat-empty i {
      font-size: 3rem;
      opacity: 0.5;
    }

    .chat-input-area {
      padding: 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-color);
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      max-height: 100px;
    }

    .chat-send-btn {
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .chat-send-btn:hover {
      background: #004999;
    }

    .no-conversation {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 968px) {
      .messaging-container {
        flex-direction: column;
        gap: 0;
      }

      .conversations-list {
        width: 100%;
        max-height: 200px;
      }

      .conversation-panel {
        height: auto;
        min-height: 400px;
      }
    }
  </style>
</head>
<body>

<!-- ========== NAVBAR ========== -->
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="nav-logo">                                       
      <span class="flag">🇳🇵</span>                 
      <span class="logo-text">Nepal Portal</span>
    </div>     
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="user-profile.html">My Profile</a></li>
      <li><a href="#">Messages</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-btn" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle dark mode">
        <i class="fas fa-moon"></i>
      </button>
      <button class="nav-btn" id="notificationBtn" onclick="toggleNotifications()" title="Notifications">
        <i class="fas fa-bell"></i>
        <span id="notifBadge" style="position: absolute; top: -5px; right: -5px; background: #ff6b6b; color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 0.7rem; display: none; align-items: center; justify-content: center;">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- ========== MESSAGING ========== -->
<div style="padding: 20px; text-align: center; background: var(--glass-bg); margin: 20px;">
  <h1>💬 Messages</h1>
  <p style="color: var(--text-muted);">Chat with community members</p>
</div>

<div class="messaging-container">
  <!-- Conversations List -->
  <div class="conversations-list">
    <div class="conversations-header">
      <h2>Conversations</h2>
    </div>
    <div class="conversations-scroll" id="conversationsList"></div>
  </div>

  <!-- Chat Panel -->
  <div class="conversation-panel">
    <div id="chatPanel">
      <div class="chat-empty">
        <i class="fas fa-comments"></i>
        <p>Select a conversation to start messaging</p>
      </div>
    </div>
  </div>
</div>

<script src="utils.js"></script>
<script src="roles.js"></script>
<script src="profiles.js"></script>
<script src="follow.js"></script>
<script src="bookmarks.js"></script>
<script src="messaging.js"></script>
<script src="notifications.js"></script>
<script src="engagement.js"></script>
<script src="script.js"></script>
<script>
let currentConversation = null;

function renderConversations() {
  const userEmail = Database.get('np_session')?.user;
  if (!userEmail) {
    document.getElementById('conversationsList').innerHTML = '<p style="padding: 20px; text-align: center;">Please log in</p>';
    return;
  }

  const conversations = Messaging.getUserConversations(userEmail);
  const container = document.getElementById('conversationsList');

  if (conversations.length === 0) {
    container.innerHTML = '<p style="padding: 20px; text-align: center; color: var(--text-muted);">No conversations yet</p>';
    return;
  }

  container.innerHTML = conversations.map(conv => {
    const otherEmail = conv.participants.find(p => p !== userEmail);
    const otherUser = Profiles.getUserProfile(otherEmail);
    const lastMsg = conv.messages[conv.messages.length - 1];

    return `
      <div class="conversation-item ${currentConversation === conv.id ? 'active' : ''}" 
           onclick="openConversation('${conv.id}', '${otherEmail}')">
        <div class="conv-avatar">${otherUser.name[0].toUpperCase()}</div>
        <div class="conv-info">
          <p class="conv-name">${otherUser.name}</p>
          <p class="conv-last-msg">${lastMsg?.text || 'No messages yet'}</p>
        </div>
      </div>
    `;
  }).join('');
}

function openConversation(convoId, otherEmail) {
  currentConversation = convoId;
  const userEmail = Database.get('np_session')?.user;
  const otherUser = Profiles.getUserProfile(otherEmail);
  const conversation = Messaging.getConversation(userEmail, otherEmail);

  // Mark all as read
  Messaging.markAllAsRead(userEmail, otherEmail);

  // Render chat panel
  const chatPanel = document.getElementById('chatPanel');
  chatPanel.innerHTML = `
    <div class="chat-header">
      <h2 style="margin: 0;">${otherUser.name}</h2>
    </div>
    <div class="chat-messages" id="messagesContainer"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="messageInput" placeholder="Type a message..." maxlength="1000"></textarea>
      <button class="chat-send-btn" onclick="sendMessage('${otherEmail}')">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  `;

  renderMessages(conversation.messages);
  renderConversations();
  
  // Focus on input
  document.getElementById('messageInput').focus();
}

function renderMessages(messages) {
  const userEmail = Database.get('np_session')?.user;
  const container = document.getElementById('messagesContainer');

  container.innerHTML = messages.map(msg => `
    <div class="message ${msg.from === userEmail ? 'sent' : 'received'}">
      <div>
        <div class="message-content">${msg.text}</div>
        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
      </div>
    </div>
  `).join('');

  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

function sendMessage(recipientEmail) {
  const userEmail = Database.get('np_session')?.user;
  const messageInput = document.getElementById('messageInput');
  const text = messageInput.value.trim();

  if (!text) return;

  Messaging.sendMessage(userEmail, recipientEmail, text);
  messageInput.value = '';
  
  openConversation(currentConversation, recipientEmail);
}

// Allow Enter to send
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) {
    const btn = document.querySelector('.chat-send-btn');
    if (btn) btn.click();
  }
});

// Initial load
document.addEventListener('DOMContentLoaded', renderConversations);
</script>
</body>
</html>

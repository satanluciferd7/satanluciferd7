<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RBAC Debug — Nepal Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      background: #f5f7fb;
      color: #111;
    }
    h1 { color: #002f6c; }
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .section-title {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #004e9f;
    }
    .output {
      background: #eef3fb;
      border-radius: 8px;
      padding: 14px;
      font-family: monospace;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button.secondary {
      background: #555;
    }
  </style>
</head>
<body>
  <h1>RBAC Debug Utility</h1>
  <p>Hidden tool for developers: this page is not linked from the public site.</p>

  <div class="section">
    <div class="section-title">Current Session</div>
    <div id="sessionInfo" class="output">Loading...</div>
  </div>

  <div class="section">
    <div class="section-title">Current Role & Permissions</div>
    <div id="roleInfo" class="output">Loading...</div>
    <div id="permissionInfo" class="output" style="margin-top:12px;"></div>
  </div>

  <div class="section">
    <div class="section-title">All Registered Roles</div>
    <div id="allUsers" class="output">Loading...</div>
  </div>

  <div class="section">
    <div class="section-title">Quick Actions</div>
    <div class="button-row">
      <button onclick="refreshDebug()">Refresh</button>
      <button class="secondary" onclick="window.location.href='index.html'">Back to Home</button>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="roles.js"></script>
  <script>
    function refreshDebug() {
      const session = JSON.parse(localStorage.getItem('np_session') || 'null');
      const role = RBACSystem.getCurrentRole();
      const permissionsToTest = [
        'access_admin_panel',
        'manage_users',
        'create_post',
        'create_problem',
        'moderate_posts'
      ];

      document.getElementById('sessionInfo').textContent = session
        ? `Logged in as: ${session.name} (${session.email})`
        : 'Not logged in.';

      document.getElementById('roleInfo').textContent = `Current role: ${role}`;

      let permText = '';
      permissionsToTest.forEach(permission => {
        permText += `${RBACSystem.hasPermission(permission) ? '✅' : '❌'} ${permission}\n`;
      });
      document.getElementById('permissionInfo').textContent = permText;

      const userRoles = JSON.parse(localStorage.getItem('np_user_roles') || '{}');
      const usersArray = Object.entries(userRoles).map(([email, role]) => `${email}: ${role}`);
      document.getElementById('allUsers').textContent = usersArray.length > 0 ? usersArray.join('\n') : 'No roles assigned.';
    }

    document.addEventListener('DOMContentLoaded', refreshDebug);
  </script>
</body>
</html>

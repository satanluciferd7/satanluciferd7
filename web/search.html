  <style>

    :root{

      --card:#111827;
      --card2:#161f30;
      --border:rgba(255,255,255,0.07);
      --accent:#3b82f6;
      --accent2:#06b6d4;
      --red:#dc2626;
      --green:#16a34a;
      --gold:#f59e0b;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --radius:14px;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    /* ── TOP BAR ── */
    .topbar{
      position:sticky;top:0;z-index:100;
      background:rgba(10,15,30,0.92);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:14px 24px;
      display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    }
    .topbar-logo{
      font-size:1.1rem;font-weight:700;
      background:linear-gradient(135deg,#3b82f6,#06b6d4);
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
      white-space:nowrap;
      text-decoration:none;
    }
    .top-search{
      flex:1;min-width:200px;max-width:640px;
      display:flex;align-items:center;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:50px;
      padding:8px 18px;
      gap:10px;
      transition:border .2s;
    }
    .top-search:focus-within{border-color:var(--accent)}
    .top-search input{
      flex:1;background:none;border:none;outline:none;
      color:var(--text);font-family:inherit;font-size:.95rem;
    }
    .top-search input::placeholder{color:var(--muted)}
    .top-search button{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;border-radius:50px;
      padding:6px 18px;color:#fff;font-size:.85rem;
      cursor:pointer;font-family:inherit;font-weight:600;
      transition:opacity .2s;
    }
    .top-search button:hover{opacity:.85}

    /* ── MAIN LAYOUT ── */
    .main{
      max-width:900px;margin:0 auto;
      padding:32px 20px 60px;
    }

    /* ── QUERY HEADER ── */
    .query-header{
      margin-bottom:28px;
    }
    .query-label{
      font-size:.8rem;color:var(--muted);letter-spacing:.04em;
      text-transform:uppercase;margin-bottom:6px;
    }
    .query-title{
      font-size:1.9rem;font-weight:700;line-height:1.2;
      background:linear-gradient(135deg,#e2e8f0,#94a3b8);
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;color:transparent;
    }
    .query-meta{
      display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;
    }
    .query-meta span{
      display:inline-flex;align-items:center;gap:5px;
      font-size:.78rem;color:var(--muted);
      background:var(--card);padding:4px 12px;border-radius:20px;
      border:1px solid var(--border);
    }

    /* ── AI ANSWER CARD ── */
    .ai-card{
      background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(6,182,212,.05));
      border:1px solid rgba(59,130,246,.25);
      border-radius:var(--radius);
      padding:28px;
      margin-bottom:28px;
      position:relative;
      overflow:hidden;
    }
    .ai-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
    }
    .ai-badge{
      display:inline-flex;align-items:center;gap:7px;
      background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(6,182,212,.1));
      border:1px solid rgba(59,130,246,.3);
      border-radius:20px;padding:4px 14px;
      font-size:.78rem;font-weight:600;color:var(--accent2);
      margin-bottom:16px;
    }
    .ai-badge i{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .ai-answer{
      font-size:.97rem;line-height:1.85;color:var(--text);
    }
    .ai-answer p{margin-bottom:14px}
    .ai-answer p:last-child{margin-bottom:0}
    .ai-answer strong{color:#93c5fd}
    .ai-answer .highlight{
      background:rgba(59,130,246,.12);
      border-left:3px solid var(--accent);
      padding:12px 16px;border-radius:0 8px 8px 0;
      margin:14px 0;font-size:.92rem;
    }
    .ai-answer ul{
      list-style:none;padding:0;margin:12px 0;
    }
    .ai-answer ul li{
      padding:6px 0 6px 22px;position:relative;
      border-bottom:1px solid var(--border);
      font-size:.9rem;
    }
    .ai-answer ul li::before{
      content:'▸';position:absolute;left:0;color:var(--accent2);
    }
    .ai-answer ul li:last-child{border-bottom:none}

    /* ── SECTION CARDS ── */
    .section-title{
      font-size:1rem;font-weight:600;color:var(--muted);
      text-transform:uppercase;letter-spacing:.06em;
      margin-bottom:14px;display:flex;align-items:center;gap:8px;
    }
    .section-title::after{
      content:'';flex:1;height:1px;background:var(--border);
    }

    .result-cards{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:14px;margin-bottom:30px;
    }
    .result-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:18px;
      transition:border-color .2s,transform .2s,box-shadow .2s;
      cursor:pointer;
    }
    .result-card:hover{
      border-color:rgba(59,130,246,.4);
      transform:translateY(-2px);
      box-shadow:0 8px 32px rgba(0,0,0,.4);
    }
    .result-card-icon{
      font-size:1.6rem;margin-bottom:10px;
    }
    .result-card h4{font-size:.95rem;font-weight:600;margin-bottom:6px}
    .result-card p{font-size:.82rem;color:var(--muted);line-height:1.6}
    .result-card .tag{
      display:inline-block;margin-top:10px;
      font-size:.72rem;padding:3px 10px;border-radius:20px;
      font-weight:500;
    }
    .tag-gov{background:rgba(59,130,246,.15);color:#93c5fd}
    .tag-tourism{background:rgba(16,185,129,.15);color:#6ee7b7}
    .tag-cyber{background:rgba(239,68,68,.15);color:#fca5a5}
    .tag-edu{background:rgba(245,158,11,.15);color:#fcd34d}
    .tag-gen{background:rgba(139,92,246,.15);color:#c4b5fd}

    /* ── TIPS BOX ── */
    .tips-box{
      background:var(--card2);border:1px solid var(--border);
      border-radius:var(--radius);padding:22px;margin-bottom:28px;
    }
    .tips-box h4{
      font-size:.95rem;font-weight:600;
      display:flex;align-items:center;gap:8px;margin-bottom:14px;
    }
    .tip-item{
      display:flex;align-items:flex-start;gap:10px;
      padding:10px 0;border-bottom:1px solid var(--border);
      font-size:.87rem;color:var(--text);
    }
    .tip-item:last-child{border-bottom:none;padding-bottom:0}
    .tip-item i{color:var(--accent2);margin-top:2px;flex-shrink:0}

    /* ── NO RESULT ── */
    .no-result{
      text-align:center;padding:60px 20px;
      color:var(--muted);
    }
    .no-result .emoji{font-size:3rem;margin-bottom:16px}
    .no-result p{font-size:1rem}

    /* ── RELATED SEARCHES ── */
    .related{
      display:flex;flex-wrap:wrap;gap:10px;margin-bottom:30px;
    }
    .related-chip{
      background:var(--card);border:1px solid var(--border);
      border-radius:50px;padding:7px 16px;
      font-size:.82rem;color:var(--muted);
      cursor:pointer;transition:all .2s;
      display:flex;align-items:center;gap:6px;
    }
    .related-chip:hover{
      background:var(--card2);border-color:rgba(59,130,246,.4);color:var(--text);
    }

    /* ── BACK BTN ── */
    .back-btn{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--card);border:1px solid var(--border);
      border-radius:50px;padding:8px 18px;
      font-size:.85rem;color:var(--muted);
      text-decoration:none;cursor:pointer;
      transition:all .2s;margin-bottom:28px;
    }
    .back-btn:hover{border-color:var(--accent);color:var(--text)}

    /* ── FOOTER ── */
    .search-footer{
      text-align:center;padding:20px;
      font-size:.78rem;color:var(--muted);
      border-top:1px solid var(--border);
    }

    /* ── LOADING ── */
    .loading{
      display:flex;flex-direction:column;align-items:center;
      padding:80px 20px;gap:16px;
    }
    .spinner{
      width:44px;height:44px;
      border:3px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── RESPONSIVE ── */
    @media(max-width:600px){
      .query-title{font-size:1.4rem}
      .topbar{padding:10px 14px}
      .main{padding:20px 14px 50px}
    }
  </style>
</head>

    answer: `
      <p><strong>Mount Everest</strong> (Nepali: सगरमाथा, Sagarmatha; Tibetan: ཇོ་མོ་གླང་མ, Chomolungma) is Earth's highest mountain above sea level, located in the <strong>Mahalangur Himal</strong> sub-range of the Himalayas. The international border between Nepal (Solukhumbu District) and China (Tibet Autonomous Region) runs across the summit.</p>
      
      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">📊 Key Statistics</h3>
      <ul>
        <li><strong>Elevation:</strong> 8,848.86 meters (29,031.7 feet) — as certified by Nepal and China in 2020</li>
        <li><strong>Coordinates:</strong> 27°59′17″N 86°55′31″E</li>
        <li><strong>Prominence:</strong> 8,848.86 m (ranked 1st in the world)</li>
        <li><strong>Parent mountain:</strong> Himalayas ( subrange: Mahalangur Himal)</li>
        <li><strong>Isolation:</strong> 16,300 km (to Mauna Loa)</li>
        <li><strong>First ascent:</strong> May 29, 1953 — Sir Edmund Hillary (NZ) and Tenzing Norgay Sherpa (NP)</li>
        <li><strong>Total ascents:</strong> Over 6,000 as of 2024</li>
        <li><strong>Fatality rate:</strong> Approximately 1.5% for climbers attempting the summit</li>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">🏔️ Geology and Formation</h3>
      <p>Mount Everest is composed of three rock formations: the <strong>Yellow Band</strong> (metamorphic rock), the <strong>Changabang Formation</strong> (granite), and the <strong>North Col Formation</strong> (limestone). The mountain is still growing approximately 4mm per year due to the ongoing collision of the Indian and Eurasian tectonic plates.</p>
      
      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">🥾 Everest Base Camp Trek — Complete Guide</h3>
      <p>The Everest Base Camp (EBC) Trek is one of the world's most iconic adventures, attracting over 40,000 trekkers annually. Here's everything you need to know:</p>
      
      <p><strong>Route Overview:</strong></p>
      <ul>
        <li><strong>Duration:</strong> 12–16 days round trip (Kathmandu to Kathmandu)</li>
        <li><strong>Distance:</strong> Approximately 130 km (80 miles) round trip</li>
        <li><strong>Starting point:</strong> Lukla (2,860m) — 30-minute flight from Kathmandu</li>
        <li><strong>Maximum altitude:</strong> 5,364m (EBC) — highest point of the trek</li>

        <li><strong>Day 5:</strong> Tengboche → Dingboche (4,410m) — 5-6 hours</li>
        <li><strong>Day 6:</strong> Acclimatization at Dingboche — hike to Nagarjun Hill (5,100m)</li>
        <li><strong>Day 7:</strong> Dingboche → Lobuche (4,910m) — 4-5 hours</li>
        <li><strong>Day 8:</strong> Lobuche → Gorakshep (5,164m) → EBC (5,364m) → Pheriche — 7-8 hours</li>
        <li><strong>Day 9:</strong> Pheriche → Namche Bazaar — 6-7 hours</li>
        <li><strong>Day 10:</strong> Namche Bazaar → Lukla — 6-7 hours</li>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">💰 Cost Breakdown (Budget to Luxury)</h3>

        <li><strong>Food:</strong> NPR 800-2,500/day (USD $6-20) — dal bhat is cheapest and most filling</li>
        <li><strong>Guide & Porter:</strong> USD $25-40/day for guide, USD $20-30/day for porter</li>
        <li><strong>Total Budget:</strong> USD $1,000-2,000 (basic) | USD $3,000-5,000 (comfortable) | USD $10,000+ (luxury)</li>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">🌡️ Climate and Weather</h3>

      </ul>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">🚁 Lukla Airport — The World's Most Dangerous</h3>
      <p>Tenzing-Hillary Airport (Lukla) is considered one of the world's most dangerous airports due to:</p>
      <ul>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">👥 Sherpa Culture</h3>
      <p>The Sherpa people are indigenous to the Khumbu region, originally migrating from Tibet 400+ years ago. They are renowned as elite mountaineers. Key cultural sites include:</p>

        <li><strong>Everest Summit Success Rate:</strong> Sherpas summit at 3x the rate of international climbers</li>
      </ul>

      <ul>
        <li><strong>First ascent:</strong> 1953 — Sir Edmund Hillary & Tenzing Norgay Sherpa</li>
        <li><strong>First ascent without oxygen:</strong> 1978 — Reinhold Messner & Peter Habeler</li>
        <li><strong>First Nepali woman summit:</strong> 1993 — Pasang Lhamu Sherpa</li>
        <li><strong>First winter ascent:</strong> 1980 — Polish expedition</li>

        <li><strong>Youngest summit:</strong> 13 years old — Jordan Romero (USA)</li>

    answer: `
      <p>The <strong>Nepal Citizenship Certificate</strong> (नागरिकता प्रमाणपत्र, Nagarikta Praman Patra) is the most important identity document for Nepali citizens. Issued by the <strong>Chief District Office (CDO)</strong>, it is required for obtaining passports, opening bank accounts, registering property, voting, and virtually all official transactions.</p>

        <li><strong>By Naturalization (प्राकृतिक):</strong> Foreign nationals married to Nepali citizens (must live in Nepal for 15 years, know Nepali language/history)</li>
        <li><strong>By Incorporation (विलय):</strong> Persons who were citizens before the current constitution</li>
        <li><strong>Honorable (सम्मानित):</strong> Granted by Government to persons with special contributions to Nepal</li>
      </ul>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">📍 Where to Apply</h3>
      <ul>
        <li><strong>Primary:</strong> Chief District Office (CDO) in your home district</li>
        <li><strong>Alternative:</strong> CDO in any district with valid domicile certificate from your home district</li>
        <li><strong>All 77 districts</strong> have CDO offices</li>
        <li><strong>Office Hours:</strong> Sunday-Friday, 10:00 AM - 5:00 PM</li>
        <li><strong>Public Holidays:</strong> Closed on Nepali public holidays</li>

        <li><strong>Passport-size Photos:</strong> 3-4 photos</li>
        <li><strong>Citizenship of Applicant's Children:</strong> If you have children, their citizenship documents</li>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">💰 Fees</h3>
      <ul>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">⏱️ Processing Time</h3>

      </ul>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">📄 Step-by-Step Process</h3>
      <ol>
        <li>Visit Ward Office to get <strong>Ward Recommendation Letter</strong></li>
        <li>Gather all required documents</li>
        <li>Visit <strong>CDO Office</strong> in your district</li>

        <li>Collect citizenship certificate</li>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">📱 Digital/National Identity Card</h3>
      <ul>
        <li><strong>Nepal is transitioning</strong> to digital biometric IDs</li>

  'tax': {
    icon: '💰', tag: 'tag-gov', category: 'Government',
    title: 'Nepal Tax & PAN Registration — Complete Guide',
    answer: `
      <p>The <strong>Permanent Account Number (PAN)</strong> (स्थायी लेखा नम्बर) is a unique 9-digit tax identification number issued by the <strong>Inland Revenue Department (IRD)</strong> of Nepal. It is mandatory for businesses, high-earning individuals, and anyone making significant financial transactions.</p>

        <li><strong>Office Hours:</strong> Sunday-Friday, 10:00 AM - 5:00 PM</li>

      <ul>
        <li><strong>All businesses:</strong> Companies, partnerships, shops, restaurants, etc.</li>
        <li><strong>Employees:</strong> Annual income above NPR 500,000</li>
        <li><strong>Property transactions:</strong> Buying or selling land, houses</li>

        <li><strong>Vehicle importers:</strong> Importers of vehicles and goods</li>
        <li><strong>Professionals:</strong> Doctors, lawyers, engineers earning above threshold</li>
        <li><strong>Rental income:</strong> Property owners with rental income above NPR 150,000/year</li>

      <p><strong>Online Application:</strong></p>

      </ol>

      <p><strong>Required Documents (Individuals):</strong></p>
      <ul>
        <li>Citizenship Certificate (original + copy)</li>
        <li>PAN Application Form (form available at IRD or online)</li>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">💰 PAN Fees</h3>
      <ul>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">📊 Income Tax Rates (FY 2023/24)</h3>
      <p><strong>For Individuals:</strong></p>
      <ul>
        <li><strong>NPR 0 - 500,000:</strong> 1% (Social Security Tax)</li>
        <li><strong>NPR 500,001 - 700,000:</strong> 10% (NPR 5,000 + 20% of amount over 500,000)</li>
        <li><strong>NPR 700,001 - 1,000,000:</strong> 20% (NPR 45,000 + 30% of amount over 700,000)</li>

      <p><strong>For Companies/Businesses:</strong></p>

      <h3 style="color:#93c5fd;margin:20px 0 10px;font-size:1.1rem;">📑 Tax Filing Process</h3>
      <ul>

function findResult(query) {
  const q = query.toLowerCase().replace(/[^a-z0-9 ]/g,'');
  // exact key match
  for (const entry of Object.entries(KB)) {
    if (q.includes(entry[0])) return entry[1];
  }
  // keyword map
  for (const km of keywordMap) {
    if (km.keys.some(k => q.includes(k))) {
      return KB[km.id];
    }
  }
  return null;
}

function getRelated(result) {
  const all = result ? (result.related || []) : ['Mount Everest','Kathmandu','Nepal passport','Phishing Nepal','Scholarship Nepal'];
  return all.slice(0, 6);
}

function buildPage(query) {
  const result = findResult(query);
  const main = document.getElementById('mainContent');

  if (!result) {
    main.innerHTML = `
      <a class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back to Nepal Portal</a>
      <div class="query-header">
        <div class="query-label">Search Results</div>
        <div class="query-title">"${esc(query)}"</div>
        <div class="query-meta">
          <span><i class="fas fa-circle-info"></i> 0 results found</span>
          <span><i class="fas fa-globe"></i> Nepal Portal AI</span>
        </div>
      </div>
      <div class="no-result">
        <div class="emoji">🔍</div>
        <p style="font-size:1.1rem;font-weight:600;margin-bottom:10px">No specific results found for "<strong>${esc(query)}</strong>"</p>
        <p>Try searching for: Tourism, Government Services, Cybersecurity, Education, or specific places in Nepal.</p>
      </div>
      ${buildRelated(['Mount Everest','Nepal passport','Phishing Nepal','Chitwan safari','Scholarship Nepal','Kathmandu'])}
    `;
    return;
  }

  main.innerHTML = `
    <a class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back to Nepal Portal</a>

    <div class="query-header">
      <div class="query-label">AI Search Result</div>
      <div class="query-title">${esc(query)}</div>
      <div class="query-meta">
        <span><i class="fas fa-robot"></i> AI Answer</span>
        <span><i class="fas fa-tag"></i> ${esc(result.category)}</span>
        <span><i class="fas fa-clock"></i> Instant</span>
      </div>
    </div>

    <div class="ai-card">
      <div class="ai-badge"><i class="fas fa-robot"></i> Nepal Portal AI</div>
      <div class="ai-answer">${result.answer}</div>
    </div>

    ${result.cards && result.cards.length ? `
    <div class="section-title"><i class="fas fa-th-large"></i> Quick Facts</div>
    <div class="result-cards">
      ${result.cards.map(c => `
        <div class="result-card">
          <div class="result-card-icon">${c.icon}</div>
          <h4>${esc(c.title)}</h4>
          <p>${esc(c.desc)}</p>
          <span class="tag ${c.tag}">${esc(result.category)}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${result.tips && result.tips.length ? `
    <div class="section-title"><i class="fas fa-lightbulb"></i> Expert Tips</div>
    <div class="tips-box">
      <h4><i class="fas fa-lightbulb" style="color:var(--gold)"></i> Tips for Nepal visitors & citizens</h4>
      ${result.tips.map(t => `
        <div class="tip-item">
          <i class="fas ${t.icon}"></i>
          <span>${esc(t.text)}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${buildRelated(result.related)}
  `;
}

function buildRelated(related) {
  if (!related || !related.length) return '';
  return `
    <div class="section-title"><i class="fas fa-compass"></i> Related Searches</div>
    <div class="related">
      ${related.map(r => `
        <div class="related-chip" onclick="openSearchTab('${esc(r).replace(/'/g,"\\'")}')">
          <i class="fas fa-search"></i> ${esc(r)}
        </div>
      `).join('')}
    </div>
  `;
}

function openSearchTab(q) {
  window.open(`search.html?q=${encodeURIComponent(q)}`, '_blank');
}

function reSearch() {
  const val = document.getElementById('topSearch').value.trim();
  if (val) window.open(`search.html?q=${encodeURIComponent(val)}`, '_blank');
}

document.getElementById('topSearch').addEventListener('keydown', e => {
  if (e.key === 'Enter') reSearch();
});

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str)));
  return d.innerHTML;
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const query = params.get('q') || '';
  document.getElementById('topSearch').value = query;

  // Simulate loading delay for UX
  setTimeout(() => {
    document.getElementById('loadingState').remove();
    if (query) {
      buildPage(query);
    } else {
      document.getElementById('mainContent').innerHTML = `
        <div class="no-result">
          <div class="emoji">🔍</div>
          <p>Enter a search term to explore Nepal Portal AI.</p>
        </div>
        ${buildRelated(['Mount Everest','Pokhara','Passport Nepal','Chitwan','Phishing Nepal','Scholarship Nepal'])}
      `;
    }
  }, 800);
});
</script>
</body>
</html>
